services:
  - type: web
    name: parentping-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./parentping.db
      - key: PARENTPING_SECRET_KEY
        generateValue: true
